name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build site
        run: |
          set -e
          mkdir -p _site

          # Tool wird unverändert an der Wurzel gehostet.
          cp index.html _site/index.html

          # Gemeinsames Stylesheet (CI-Tokens, identisch mit dem Inline-CSS im Tool).
          cp assets/site.css _site/style.css

          pandoc README.md -s \
            --css=style.css \
            --include-before-body=assets/nav.html \
            -V pagetitle="Dinge einfach wiederfinden" \
            -o _site/README.html
          # Pandoc kapselt den Seiteninhalt nicht automatisch in einen Container;
          # .doc sorgt hier für dieselbe max-width wie beim Tool.
          sed -i 's/<body>/<body><div class="doc">/; s/<\/body>/<\/div><\/body>/' _site/README.html

          pandoc Syntax-Leitfaden.md -s \
            --css=style.css \
            --include-before-body=assets/nav.html \
            -V pagetitle="Tag-Syntax für Control-Mapping" \
            -o _site/Syntax-Leitfaden.html
          sed -i 's/<body>/<body><div class="doc">/; s/<\/body>/<\/div><\/body>/' _site/Syntax-Leitfaden.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
